services:
  - type: web
    name: snipr-url-shortener
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    # NOTE: /health is now behind admin auth (per the auth system spec), so it
    # can no longer serve as Render's automated healthCheckPath — Render's
    # pinger has no admin session and would get redirected/401'd, marking the
    # service unhealthy. Omitted here; Render falls back to a plain TCP check
    # on the port. If you want a real HTTP health check restored, add a
    # small unauthenticated route (e.g. GET /healthz) and point this at it.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_CONNECTION_LIMIT
        value: 10
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: CORS_ORIGIN
        sync: false
      - key: CACHE_CAPACITY
        value: 500
      - key: SHORT_CODE_LENGTH
        value: 7
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: COOKIE_NAME
        value: admin_token
      - key: MAX_LOGIN_ATTEMPTS
        value: 5
      - key: LOCK_DURATION_MINUTES
        value: 15
