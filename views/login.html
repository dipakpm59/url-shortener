<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Snipr</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head>
<body class="hero-bg d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="hero-orb one"></div>
  <div class="hero-orb two"></div>

  <div class="container position-relative" style="z-index:1;">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <div class="text-center mb-4">
          <a href="/" class="navbar-brand fs-3 brand-mark"><i class="bi bi-link-45deg"></i> Snipr</a>
          <div class="text-muted-soft small mt-1">Admin access only</div>
        </div>

        <div class="glass-card p-4 p-md-5">
          <h4 class="fw-bold mb-1">Welcome back</h4>
          <p class="text-muted-soft small mb-4">Sign in to manage links and view analytics.</p>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label class="form-label text-muted-soft small" for="email">Email or Username</label>
              <input type="text" id="email" class="form-control form-control-dark" placeholder="admin@example.com or admin" required autocomplete="username">
              <div class="invalid-feedback-custom small text-danger mt-1 d-none" id="email-error">Enter your email or username.</div>
            </div>

            <div class="mb-2">
              <label class="form-label text-muted-soft small" for="password">Password</label>
              <div class="input-group">
                <input type="password" id="password" class="form-control form-control-dark border-end-0" placeholder="••••••••" required autocomplete="current-password">
                <button class="btn btn-outline-brand border-start-0" type="button" id="toggle-password" tabindex="-1" aria-label="Show password">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback-custom small text-danger mt-1 d-none" id="password-error">Password is required.</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me">
                <label class="form-check-label small text-muted-soft" for="remember-me">Remember me</label>
              </div>
            </div>

            <button type="submit" class="btn btn-brand btn-lg w-100" id="login-btn">
              <span class="btn-label"><i class="bi bi-box-arrow-in-right me-1"></i> Sign In</span>
            </button>
          </form>
        </div>

        <div class="text-center mt-4">
          <a href="/" class="text-muted-soft small"><i class="bi bi-arrow-left me-1"></i>Back to home</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
