name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    name: Install, syntax-check, and verify build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        run: |
          find src server.js -name "*.js" -print0 | xargs -0 -I{} node --check "{}"
          echo "All files passed syntax check."

      - name: Verify the app module loads (build verification)
        # A dummy JWT_SECRET is enough — this only proves the app can be
        # required without throwing at startup; it never connects to a
        # real database or opens a network port.
        env:
          JWT_SECRET: ci-placeholder-secret-not-used-for-anything-real
        run: node -e "require('./src/app.js'); console.log('src/app.js loaded successfully.');"

      - name: Run tests (if any)
        run: npm test --if-present
